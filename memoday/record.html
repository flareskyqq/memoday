<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4A90E2">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <title>记录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            max-width: 500px;
            margin: 0 auto;
        }
        .header {
            background: #4A90E2;
            color: white;
            padding: 15px;
            display: flex;
            align-items: center;
        }
        .back { color: white; text-decoration: none; font-size: 20px; margin-right: 15px; }
        .header h1 { font-size: 18px; }
        .current-date {
            padding: 15px;
            background: white;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }
        .no-date {
            padding: 40px;
            text-align: center;
            color: #999;
        }
        .section { background: white; margin-top: 10px; }
        .section-title {
            padding: 10px 15px;
            background: #f9f9f9;
            font-size: 14px;
            color: #666;
            border-bottom: 1px solid #eee;
        }
        .event-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
        }
        .event-dot { width: 16px; height: 16px; border-radius: 50%; margin-right: 12px; flex-shrink: 0; }
        .event-name { flex: 1; font-size: 16px; }
        .btn-action {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-add { background: #2ECC71; color: white; }
        .btn-del { background: #e74c3c; color: white; }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" class="back" id="backBtn">&lt;</a>
        <h1>记录</h1>
    </div>

    <div class="current-date" id="currentDate"></div>
    <div id="noDateMsg" class="no-date" style="display:none">请先在主页面选择一天</div>

    <div class="section" id="eventSection" style="display:none">
        <div class="section-title">选择事件</div>
        <div id="eventList"></div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const user = params.get('user') || 'root';
        const date = params.get('date');

        // 更新返回链接
        document.getElementById('backBtn').href = 'index.html?user=' + user + (date ? '&date=' + date : '');

        let eventTypes = [];
        let recordedIds = new Set();

        if (!date) {
            document.getElementById('currentDate').style.display = 'none';
            document.getElementById('noDateMsg').style.display = 'block';
        } else {
            const dateParts = date.split('-');
            document.getElementById('currentDate').textContent = `${parseInt(dateParts[1])}月${parseInt(dateParts[2])}日`;
            document.getElementById('eventSection').style.display = 'block';
        }

        async function loadData() {
            if (!date) return;

            const [typesRes, recordsRes] = await Promise.all([
                fetch(`api.php?action=get_types&user=${user}`),
                fetch(`api.php?action=get_records&user=${user}&date=${date}`)
            ]);
            eventTypes = await typesRes.json();
            const records = await recordsRes.json();
            recordedIds = new Set(records.map(r => r.event_type_id));
            renderList();
        }

        function renderList() {
            const list = document.getElementById('eventList');
            if (eventTypes.length === 0) {
                list.innerHTML = '<div style="padding:20px;text-align:center;color:#999">暂无事件，请先在编辑页添加</div>';
                return;
            }
            list.innerHTML = eventTypes.map(t => {
                const isRecorded = recordedIds.has(t.id);
                return `
                <div class="event-item">
                    <div class="event-dot" style="background:${t.color}"></div>
                    <div class="event-name">${t.name}</div>
                    ${isRecorded
                        ? `<button class="btn-action btn-del" onclick="toggleRecord(${t.id}, false)">删除</button>`
                        : `<button class="btn-action btn-add" onclick="toggleRecord(${t.id}, true)">添加</button>`
                    }
                </div>`;
            }).join('');
        }

        async function toggleRecord(eventTypeId, add) {
            if (add) {
                await fetch(`api.php?action=add_record&user=${user}&event_type_id=${eventTypeId}&date=${date}`);
            } else {
                // 找到对应的记录ID删除
                const recordsRes = await fetch(`api.php?action=get_records&user=${user}&date=${date}`);
                const records = await recordsRes.json();
                const record = records.find(r => r.event_type_id == eventTypeId);
                if (record) {
                    await fetch(`api.php?action=del_record&user=${user}&id=${record.id}`);
                }
            }
            loadData();
        }

        loadData();
    </script>
</body>
</html>
